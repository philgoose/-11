<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>계산기</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1 class="app__title">계산기</h1>
      </header>
      <div class="calculator" role="application" aria-label="계산기">
        <div class="display" aria-live="polite">
          <div class="display__expression" id="expression" aria-hidden="true"></div>
          <div class="display__value" id="display">0</div>
        </div>
        <div class="keys" id="keys">
          <button type="button" class="key key--fn" data-action="clear">AC</button>
          <button type="button" class="key key--fn" data-action="sign">±</button>
          <button type="button" class="key key--fn" data-action="percent">%</button>
          <button type="button" class="key key--op" data-op="÷">÷</button>

          <button type="button" class="key" data-digit="7">7</button>
          <button type="button" class="key" data-digit="8">8</button>
          <button type="button" class="key" data-digit="9">9</button>
          <button type="button" class="key key--op" data-op="×">×</button>

          <button type="button" class="key" data-digit="4">4</button>
          <button type="button" class="key" data-digit="5">5</button>
          <button type="button" class="key" data-digit="6">6</button>
          <button type="button" class="key key--op" data-op="−">−</button>

          <button type="button" class="key" data-digit="1">1</button>
          <button type="button" class="key" data-digit="2">2</button>
          <button type="button" class="key" data-digit="3">3</button>
          <button type="button" class="key key--op" data-op="+">+</button>

          <button type="button" class="key key--wide" data-digit="0">0</button>
          <button type="button" class="key" data-action="decimal">.</button>
          <button type="button" class="key key--op key--equals" data-action="equals">=</button>
        </div>
      </div>
      <p class="hint">키보드: 숫자·연산자·Enter(=)·Escape(AC)·Backspace</p>
    </main>
    <script src="app.js"></script>
  </body>
</html>
